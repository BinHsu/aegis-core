apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis-gateway
  namespace: aegis
  labels:
    app.kubernetes.io/name: aegis-gateway
    app.kubernetes.io/part-of: aegis-core
    app.kubernetes.io/component: api-gateway
spec:
  # Two replicas to exercise ADR-0017's N:N assumption in staging.
  # Scaling policy (HPA) deferred until Phase 4d emits metrics.
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: aegis-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aegis-gateway
        app.kubernetes.io/part-of: aegis-core
        app.kubernetes.io/component: api-gateway
    spec:
      serviceAccountName: aegis-gateway
      # ADR-0006 Graceful Shutdown — 30s matches Go gateway's drain
      # timeout; long enough for in-flight WebRTC sessions to finish
      # server-side cleanup, short enough to not pin rolling updates.
      terminationGracePeriodSeconds: 30
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gateway
          # === IMAGE TAG — bootstrap value ===
          # C-1 ships with the last known-good staging SHA. Automated
          # tag-update loop (Argo Image Updater vs CI-commits-tag) is
          # deferred to C-1.5 per deploy/README.md §"Known gap".
          # Registry host comes from ldz #11 platform contract.
          image: 251774439261.dkr.ecr.eu-central-1.amazonaws.com/aegis-core:staging-db14d67559d079d48633dc3a536666eba080ac05
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            # Prometheus pull endpoint — C-Obs-1.
            - name: metrics
              containerPort: 8081
              protocol: TCP
          env:
            - name: AEGIS_DEPLOY_MODE
              value: CLOUD
            - name: AEGIS_ENGINE_ADDR
              # Headless Service DNS — gRPC client-side round_robin
              # resolver walks all backing pod IPs (ADR-0017).
              value: "aegis-engine.aegis.svc.cluster.local:50051"
            - name: AEGIS_LOG_LEVEL
              value: "info"
          securityContext:
            # ADR-0025 distroless nonroot + defense-in-depth hardening.
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            # Starting values — Phase 4d HPA will tune once metrics
            # emit. Gateway is primarily an I/O orchestrator, not
            # compute-heavy, so memory baseline is modest.
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2
          volumeMounts:
            # readOnlyRootFilesystem: true requires writable /tmp
            # for any ephemeral buffering. Kept small and tmpfs-backed
            # to honor ADR-0005 R5 "no host disk for audio".
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: aegis-gateway
