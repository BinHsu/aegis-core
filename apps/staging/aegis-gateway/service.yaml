apiVersion: v1
kind: Service
metadata:
  name: aegis-gateway
  namespace: aegis
  labels:
    app.kubernetes.io/name: aegis-gateway
    app.kubernetes.io/part-of: aegis-core
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: aegis-gateway
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
