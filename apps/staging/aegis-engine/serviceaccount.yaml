apiVersion: v1
kind: ServiceAccount
metadata:
  name: aegis-engine
  namespace: aegis
  labels:
    app.kubernetes.io/name: aegis-engine
    app.kubernetes.io/part-of: aegis-core
  annotations:
    # ldz #54 pre-provisioned an IRSA role with trust scope
    # `system:serviceaccount:aegis:aegis-engine`. The permission
    # policy on the role is currently empty (skeleton) and will
    # be populated on the ldz side when engine gains concrete
    # AWS API surface (e.g., S3 model streaming per ADR-0026
    # follow-ups). The annotation is added now so the IRSA
    # contract is complete from this side; AWS-side permissions
    # attach independently.
    eks.amazonaws.com/role-arn: arn:aws:iam::251774439261:role/aegis-staging-aegis-engine
