apiVersion: v1
kind: Namespace
metadata:
  name: aegis
  labels:
    app.kubernetes.io/part-of: aegis-core
    aegis.binhsu.org/tier: staging
    # Policy anchor — Phase 4c C-6 slice adds Kyverno/Gatekeeper
    # ClusterPolicies scoped to this label selector:
    #   - ADR-0005 R6: deny pods in this ns with PVC or hostPath
    #   - ADR-0031: deny pods here missing the TLS cert volume mount
    aegis.binhsu.org/audio-policy-scope: enforce
