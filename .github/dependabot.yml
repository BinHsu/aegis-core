# Dependabot version-updates config for Aegis Core.
#
# Aegis has five distinct dependency surfaces. Dependabot covers them
# below with conservative schedules so drift is noticed without spamming
# review queues. Security alerts (separate from version updates) are
# enabled repo-wide and fire immediately on vulnerable deps.

version: 2

updates:
  # ---------------------------------------------------------------------------
  # GitHub Actions — catches workflow action version drift.
  # ---------------------------------------------------------------------------
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions

  # ---------------------------------------------------------------------------
  # Go modules (gateway_go/). grpc-go + protobuf-go bump frequently;
  # keep a weekly cadence but grouped so we don't drown in micro-PRs.
  # ---------------------------------------------------------------------------
  - package-ecosystem: gomod
    directory: "/gateway_go"
    schedule:
      interval: weekly
      day: tuesday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - go
    groups:
      grpc-protobuf:
        patterns:
          - "google.golang.org/grpc*"
          - "google.golang.org/protobuf"
          - "github.com/golang/protobuf"
      otel:
        patterns:
          - "go.opentelemetry.io/*"
    # `google.golang.org/grpc` is pinned to 1.74.2 (PR #89, OTLP slice)
    # for `otelgrpc` v0.59 compatibility. Patch bumps (1.74.x) stay
    # automated; minor / major bumps need a coordinated upgrade with
    # `otelgrpc` to a version that explicitly supports the new grpc.
    # Re-evaluate when `otelgrpc` ships v0.60+ — at that point this
    # ignore rule and the corresponding pin both lift in the same PR.
    ignore:
      - dependency-name: "google.golang.org/grpc"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-major"

  # ---------------------------------------------------------------------------
  # NPM (frontend_web/). Vite and React moved fast; don't auto-open PRs
  # for every patch — monthly + patch-level only to keep signal high.
  # ---------------------------------------------------------------------------
  - package-ecosystem: npm
    directory: "/frontend_web"
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - frontend
    versioning-strategy: increase-if-necessary

  # ---------------------------------------------------------------------------
  # Bazel MODULE.bazel deps. Dependabot has native bzlmod support.
  # ---------------------------------------------------------------------------
  - package-ecosystem: bazel
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - bazel
    # ggml / whisper_cpp / llama_cpp are a version-coupled triple
    # (ADR-0021). Dependabot bumps deps independently, which would
    # break the build. These three are upgraded manually as a unit.
    ignore:
      - dependency-name: "ggml"
      - dependency-name: "whisper_cpp"
      - dependency-name: "llama_cpp"
# Python pip stanza removed alongside tools/rag/ deletion — the engine
# will own both seed-time and query-time bge-m3 embedding per
# ADR-0020 (forthcoming), so the repo no longer has a Python runtime
# surface to track. Python remains a dev/CI tool (pre-commit) and
# does not need Dependabot coverage at that tier.

# ---------------------------------------------------------------------------
# Docker (Dockerfile) — Phase 4a adds Dockerfiles. Enabling this
# stanza before any Dockerfile exists produces a hard Dependabot job
# failure rather than a no-op (Incident #07 — see docs/incidents.md).
# Un-comment when Phase 4a lands real Dockerfiles.
