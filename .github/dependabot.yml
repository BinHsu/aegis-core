# Dependabot version-updates config for Aegis Core.
#
# Aegis has five distinct dependency surfaces. Dependabot covers them
# below with conservative schedules so drift is noticed without spamming
# review queues. Security alerts (separate from version updates) are
# enabled repo-wide and fire immediately on vulnerable deps.

version: 2

updates:
  # ---------------------------------------------------------------------------
  # GitHub Actions — catches workflow action version drift.
  # ---------------------------------------------------------------------------
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions

  # ---------------------------------------------------------------------------
  # Go modules (gateway_go/). grpc-go + protobuf-go bump frequently;
  # keep a weekly cadence but grouped so we don't drown in micro-PRs.
  # ---------------------------------------------------------------------------
  - package-ecosystem: gomod
    directory: "/gateway_go"
    schedule:
      interval: weekly
      day: tuesday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - go
    groups:
      grpc-protobuf:
        patterns:
          - "google.golang.org/grpc*"
          - "google.golang.org/protobuf"
          - "github.com/golang/protobuf"
      otel:
        patterns:
          - "go.opentelemetry.io/*"

  # ---------------------------------------------------------------------------
  # NPM (frontend_web/). Vite and React moved fast; don't auto-open PRs
  # for every patch — monthly + patch-level only to keep signal high.
  # ---------------------------------------------------------------------------
  - package-ecosystem: npm
    directory: "/frontend_web"
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - frontend
    versioning-strategy: increase-if-necessary

  # ---------------------------------------------------------------------------
  # Bazel MODULE.bazel deps. Dependabot has native bzlmod support.
  # ---------------------------------------------------------------------------
  - package-ecosystem: bazel
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - bazel

  # ---------------------------------------------------------------------------
  # Python (tools/rag/). The ML ecosystem (torch, FlagEmbedding,
  # langchain-*) iterates fast; a weekly cadence here would drown the
  # review queue with patch-level releases. Monthly + grouped, so the
  # entire RAG seed stack comes in as a single PR per month. Security
  # alerts (separate channel, immediate) catch CVEs regardless.
  # ---------------------------------------------------------------------------
  - package-ecosystem: pip
    directory: "/tools/rag"
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - python
      - rag
    groups:
      rag-stack:
        patterns:
          - "torch*"
          - "FlagEmbedding"
          - "qdrant-client"
          - "langchain-*"
          - "langdetect"

  # ---------------------------------------------------------------------------
  # Docker (Dockerfile) — Phase 4a adds Dockerfiles. Enabling this
  # stanza before any Dockerfile exists produces a hard Dependabot job
  # failure rather than a no-op (Incident #07 — see docs/incidents.md).
  # Un-comment when Phase 4a lands real Dockerfiles.
  # ---------------------------------------------------------------------------
  # - package-ecosystem: docker
  #   directory: "/"
  #   schedule:
  #     interval: weekly
  #   open-pull-requests-limit: 3
  #   labels:
  #     - dependencies
  #     - docker
