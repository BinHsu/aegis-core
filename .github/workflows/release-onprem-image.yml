name: Release on-prem image to GHCR

# WS2-1 (DRAFT) — build the core images on a Linux runner and publish them
# to GHCR so the local on-prem Talos cluster can consume them.
#
# WHY this exists, separate from release-staging-image.yml:
#   - That workflow pushes to ECR via GitHub OIDC, and the landing-zone IAM
#     trust pins its job_workflow_ref. This one touches NO AWS — it authes to
#     GHCR with the built-in GITHUB_TOKEN (packages: write) — so it does not
#     widen any AWS trust scope.
#   - The local-first WS2 path has no ECR (accounts are at zero) and CI cannot
#     reach the in-cluster registry. GHCR is the CI -> local transport: CI
#     publishes here, the operator crane-pulls and re-pushes into the cluster's
#     registry:2. (See the WS2 plan on aegis-platform-aws#46.)
#
# WHY a native arm64 runner:
#   The local Talos cluster runs on apple/container = linux/arm64. An amd64
#   image (the ubuntu-latest default) would not run there. ubuntu-24.04-arm is
#   GitHub's free arm64 Linux runner for public repos. local_config_cc
#   auto-detects the runner's arm64 GCC — no toolchain / sysroot setup, no
#   BUILD changes. This is also why the engine build belongs in CI, not on the
#   16GB dev host: the grpc + BoringSSL + whisper.cpp/ggml/llama.cpp link line
#   needs more RAM than that host can spare for a build VM (de-risked 2026-06-16).
#
# RUNTIME-BASE glibc must be >= the build glibc (resolved 2026-06-16, WS2-2):
#   The engine binary is dynamically linked and local_config_cc is non-hermetic,
#   so it inherits the runner's glibc (ubuntu-24.04-arm = glibc 2.39, GCC 13 /
#   GLIBCXX_3.4.32). glibc is forward-compatible, not backward — the runtime
#   base must therefore ship glibc >= 2.39. distroless cc-debian12 (glibc 2.36)
#   was too old: the engine crashed at startup with `GLIBC_2.38 not found` /
#   `GLIBCXX_3.4.32 not found`. The base is now cc-debian13 (Debian 13, glibc
#   2.41 / GCC 14) — see packaging/engine/BUILD.bazel + MODULE.bazel.
#
# Manual trigger only for now (local-first; the operator pulls on demand). A
# push trigger can be added once the WS2 on-prem flow stabilises.

on:
  workflow_dispatch:
    inputs:
      push_gateway:
        description: "Also build + push the gateway image (Go; builds fast)"
        type: boolean
        default: true

# GHCR auth uses the built-in token. No id-token / AWS here.
permissions:
  contents: read
  packages: write

env:
  # GHCR repos (lowercase owner required). The image type lives in the repo
  # name rather than a tag prefix — GHCR is one package per name.
  GHCR_ENGINE: ghcr.io/binhsu/aegis-core-engine
  GHCR_GATEWAY: ghcr.io/binhsu/aegis-core-gateway

jobs:
  push-onprem-image:
    name: Build + push core images to GHCR (linux/arm64)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45
    # Surface the pushed digests so bump-image-tag can pin the deploy overlay
    # BY DIGEST (ADR-14/17). gateway_ref is "" when push_gateway input is false.
    outputs:
      engine_ref: ${{ steps.push-engine.outputs.ref }}
      gateway_ref: ${{ steps.push-gateway.outputs.ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      # Same cache shape as release-staging-image.yml. Note the cache key is
      # NOT arch-qualified there; this workflow is the only arm64 builder, so
      # give it its own key prefix to avoid cross-arch artifact mixing.
      - name: Cache Bazel
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ${{ github.workspace }}/.bazel_cache
            ${{ github.workspace }}/.bazelisk
            /tmp/aegis-bazel-*
          key: bazel-onprem-arm64-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', '.bazelversion', '.bazelrc') }}
          restore-keys: |
            bazel-onprem-arm64-

      # Optional remote cache, mirrors ci-baseline.yml. Degrades to local
      # execution when the secret is absent (forks).
      - name: Configure BuildBuddy remote cache
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        run: |
          if [ -z "${BUILDBUDDY_API_KEY:-}" ]; then
            echo "BUILDBUDDY_API_KEY not set — skipping remote cache (normal in forks)"
            exit 0
          fi
          echo "::add-mask::$BUILDBUDDY_API_KEY"
          cat > .bazelrc.user <<EOF
          build --remote_cache=grpcs://remote.buildbuddy.io
          build --remote_header=x-buildbuddy-api-key=$BUILDBUDDY_API_KEY
          build --bes_backend=grpcs://remote.buildbuddy.io
          build --bes_results_url=https://app.buildbuddy.io/invocation/
          build --remote_timeout=3600
          EOF

      # rules_oci's oci_push reads ~/.docker/config.json. Log in to GHCR so the
      # subsequent bazel run authenticates automatically.
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build engine OCI image (linux/arm64)
        run: ./tools/bazelisk/bazelisk build //packaging/engine:image

      # Reuse the existing push_staging rule; --repository / --tag are runtime
      # overrides (the BUILD default points at ECR and is never used here). No
      # engine smoke step: the engine loads a ggml model from /models at start
      # and crashes without it (engine_cpp/cmd/engine/main.cc) — the model
      # arrives via MinIO in WS2-2. Deliverable = builds + pushes by digest.
      - name: Push engine image to GHCR
        id: push-engine
        run: |
          set -euxo pipefail
          TAG="onprem-${GITHUB_SHA}"
          ./tools/bazelisk/bazelisk run //packaging/engine:push_staging -- \
            --repository "${GHCR_ENGINE}" \
            --tag "${TAG}" 2>&1 | tee /tmp/engine-push.log
          DIGEST=$(grep -oE 'sha256:[a-f0-9]{64}' /tmp/engine-push.log | tail -1)
          echo "ref=${GHCR_ENGINE}@${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "::notice title=Engine image pushed::${GHCR_ENGINE}:${TAG} (${DIGEST})"

      # arm64 gateway target (:image_arm64 / :push_onprem), NOT the amd64
      # :image / :push_staging the ECR workflow uses. The gateway is pure Go
      # and would cross-compile either arch, but :image packs the amd64
      # cross-binary on an amd64 base — publishing THAT under the arm64 GHCR
      # name shipped an amd64 ELF that `exec format error`d on the arm64
      # Talos / Graviton nodes. :image_arm64 packs the linux/arm64 binary on
      # the arm64 distroless base (see packaging/gateway/BUILD.bazel).
      - name: Build gateway OCI image (linux/arm64)
        if: ${{ inputs.push_gateway }}
        run: ./tools/bazelisk/bazelisk build //packaging/gateway:image_arm64

      - name: Push gateway image to GHCR
        id: push-gateway
        if: ${{ inputs.push_gateway }}
        run: |
          set -euxo pipefail
          TAG="onprem-${GITHUB_SHA}"
          ./tools/bazelisk/bazelisk run //packaging/gateway:push_onprem -- \
            --repository "${GHCR_GATEWAY}" \
            --tag "${TAG}" 2>&1 | tee /tmp/gateway-push.log
          DIGEST=$(grep -oE 'sha256:[a-f0-9]{64}' /tmp/gateway-push.log | tail -1)
          echo "ref=${GHCR_GATEWAY}@${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "::notice title=Gateway image pushed::${GHCR_GATEWAY}:${TAG} (${DIGEST})"

      - name: Summary
        # Step outputs are surfaced through env, not interpolated directly
        # into the run: body — ${{ }} expansion into a shell here is the
        # run-shell-injection sink semgrep flags. Reading them as quoted
        # $VAR shell variables removes the code-execution path.
        env:
          ENGINE_REF: ${{ steps.push-engine.outputs.ref }}
          GATEWAY_REF: ${{ steps.push-gateway.outputs.ref }}
          PUSH_GATEWAY: ${{ inputs.push_gateway }}
        run: |
          {
            echo "## Core images pushed to GHCR (linux/arm64)"
            echo "- engine:  \`${ENGINE_REF}\`"
            if [ "${PUSH_GATEWAY}" = "true" ]; then
              echo "- gateway: \`${GATEWAY_REF}\`"
            fi
            echo ""
            echo "Pull into the local cluster registry, e.g.:"
            echo '```'
            echo "crane copy ${ENGINE_REF} <node-ip>:5000/aegis-core@<digest>"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # Pin the STAGING overlay in aegis-core-deploy to the digests just pushed,
  # via a PR + auto-merge (ADR-10/14/23 "build once, promote by digest"). This
  # replaces the bump-image-tag job from the retired release-staging-image.yml;
  # the difference is the refs are now FULL GHCR refs the deploy repo owns
  # directly (ADR-23), not the registry-less `aegis-core@<digest>` the ECR path
  # spliced. Staging only — prod is promoted by a separate gated PR (ADR-14
  # atomic promotion, enforced by the deploy repo's validate.yml Guard D).
  bump-image-tag:
    name: Pin staging digests in aegis-core-deploy (PR + auto-merge)
    runs-on: ubuntu-latest
    needs: push-onprem-image
    timeout-minutes: 10
    # Never writes to THIS repo. The cross-repo write to aegis-core-deploy is
    # authenticated by AEGIS_CORE_DEPLOY_PAT (fine-grained: contents:write +
    # pull-requests:write on that repo), not GITHUB_TOKEN. No AWS here.
    steps:
      - name: Pin staging overlay digests (PR + auto-merge)
        env:
          DEPLOY_PAT: ${{ secrets.AEGIS_CORE_DEPLOY_PAT }}
          # Full GHCR refs from the push job. GATEWAY_REF is "" when the
          # push_gateway dispatch input was false (gateway steps skipped).
          ENGINE_REF: ${{ needs.push-onprem-image.outputs.engine_ref }}
          GATEWAY_REF: ${{ needs.push-onprem-image.outputs.gateway_ref }}
          RUN_SHA: ${{ github.sha }}
        run: |
          set -uo pipefail

          # Fail-soft: a missing deploy credential is an ops gap, not a build
          # failure — the images are already in GHCR. Warn (naming the secret)
          # and exit 0 rather than red the release run.
          if [ -z "${DEPLOY_PAT:-}" ]; then
            echo "::warning title=Digest bump skipped::AEGIS_CORE_DEPLOY_PAT not set — cannot open the tag-bump PR. Create a fine-grained PAT (BinHsu/aegis-core-deploy, contents:write + pull-requests:write) and store it as the AEGIS_CORE_DEPLOY_PAT repository secret."
            exit 0
          fi
          echo "::add-mask::${DEPLOY_PAT}"

          # Both refs required — a gateway-only or engine-only pin would leave
          # the overlay half-updated and trip the deploy repo's move-together
          # guard at the next staging bring-up. Empty gateway = push_gateway
          # was false; warn and skip cleanly.
          if [ -z "${ENGINE_REF:-}" ] || [ -z "${GATEWAY_REF:-}" ]; then
            echo "::warning title=Digest bump skipped::One or both image refs are empty (gateway='${GATEWAY_REF:-}', engine='${ENGINE_REF:-}'). Re-dispatch with push_gateway=true to pin both images."
            exit 0
          fi

          # Validate ref shape before writing — guards against a grep miss
          # producing a malformed pin in a repo ArgoCD syncs.
          ref_re='^ghcr\.io/binhsu/aegis-core-(gateway|engine)@sha256:[0-9a-f]{64}$'
          for ref in "${GATEWAY_REF}" "${ENGINE_REF}"; do
            if [[ ! "${ref}" =~ ${ref_re} ]]; then
              echo "::error title=Malformed image ref::'${ref}' is not ghcr.io/binhsu/aegis-core-{gateway,engine}@sha256:<64-hex> — aborting before writing a bad pin."
              exit 1
            fi
          done

          SHORT_SHA="${RUN_SHA:0:12}"

          git clone --depth 1 \
            "https://x-access-token:${DEPLOY_PAT}@github.com/BinHsu/aegis-core-deploy.git" \
            deploy
          cd deploy

          # Each digest file is a JSON6902 one-element list; set [0].value.
          # All edits before any git op = one atomic commit (ADR-14
          # both-or-neither). seed == engine digest (validate.yml Guard C).
          yq -i ".[0].value = \"${GATEWAY_REF}\"" k8s/overlays/staging/digest-gateway.yaml
          yq -i ".[0].value = \"${ENGINE_REF}\""  k8s/overlays/staging/digest-engine.yaml
          yq -i ".[0].value = \"${ENGINE_REF}\""  k8s/overlays/staging/digest-seed.yaml

          if git diff --quiet; then
            echo "::notice title=Digest bump::aegis-core-deploy staging overlay already at these digests; nothing to bump."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          BRANCH="release/tag-${SHORT_SHA}"
          git checkout -b "${BRANCH}"
          git add k8s/overlays/staging/digest-gateway.yaml \
                  k8s/overlays/staging/digest-engine.yaml \
                  k8s/overlays/staging/digest-seed.yaml
          git commit \
            -m "ci(deploy): pin aegis-core staging digests (${SHORT_SHA})" \
            -m "Automated by release-onprem-image.yml in aegis-core (ADR-10/14/23)." \
            -m "gateway: ${GATEWAY_REF}" \
            -m "engine:  ${ENGINE_REF}" \
            -m "seed:    ${ENGINE_REF}  (== engine, ADR-14)"
          # --force: re-dispatch for the same source SHA reuses the branch name.
          git push --force origin "${BRANCH}"

          export GH_TOKEN="${DEPLOY_PAT}"
          EXISTING_PR="$(gh pr list --repo BinHsu/aegis-core-deploy \
            --head "${BRANCH}" --state open --json number --jq '.[].number')"
          if [ -z "${EXISTING_PR}" ]; then
            gh pr create --repo BinHsu/aegis-core-deploy \
              --base main --head "${BRANCH}" \
              --title "ci(deploy): pin aegis-core staging digests (${SHORT_SHA})" \
              --body "$(printf 'Pins the **staging** overlay BY DIGEST to the build from aegis-core \x60%s\x60 (ADR-10/14/23; gateway + engine + seed move atomically).\n\n- Gateway: \x60%s\x60\n- Engine:  \x60%s\x60\n- Seed:    \x60%s\x60 (== engine, ADR-14)\n\nAutomated by release-onprem-image.yml. Auto-merge armed: squash-merges once validate.yml passes. **Staging only — prod promotion is a separate gated PR.**' \
                "${RUN_SHA}" "${GATEWAY_REF}" "${ENGINE_REF}" "${ENGINE_REF}")"
          fi
          # Arms auto-merge; GitHub squash-merges only after validate.yml passes.
          gh pr merge --auto --squash --repo BinHsu/aegis-core-deploy "${BRANCH}"
          echo "::notice title=Digest bump PR::aegis-core-deploy PR opened + auto-merge armed for ${BRANCH}."
